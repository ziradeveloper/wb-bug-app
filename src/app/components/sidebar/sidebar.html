<!-- Desktop Sidebar Toggle Button -->
<div class="d-none d-lg-flex flex-column">
  <button
    class="btn btn-outline-secondary m-2 align-self-start"
    (click)="toggleSidebar()"
    title="Toggle Sidebar"
  >
    <i class="bi bi-list"></i>
  </button>

  <!-- Desktop Sidebar -->
  <nav
    class="bg-light border-end h-100 transition-all"
    [ngClass]="{ 'sidebar-collapsed': isCollapsed }"
  >
    <ul class="nav flex-column p-3 gap-2">
      <ng-container *ngFor="let item of menuItems">
        <!-- Menu Item with/without children -->
        <li class="nav-item">
          <!-- If item has children, show as expandable -->
          <button
            *ngIf="hasChildren(item)"
            class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded w-100 text-start"
            (click)="toggleMenuExpand(item)"
            [attr.aria-expanded]="item.isExpanded"
          >
            <i class="bi" [ngClass]="item.icon"></i>
            <span class="menu-text" [ngClass]="{ 'd-none': isCollapsed }">
              {{ item.label }}
            </span>
            <i
              class="bi bi-chevron-down ms-auto menu-text"
              [ngClass]="{
                'd-none': isCollapsed,
                'rotate-180': item.isExpanded
              }"
            ></i>
          </button>

          <!-- If item has no children, show as link -->
          <a
            *ngIf="!hasChildren(item)"
            class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded"
            [routerLink]="item.route"
            routerLinkActive="active"
          >
            <i class="bi" [ngClass]="item.icon"></i>
            <span class="menu-text" [ngClass]="{ 'd-none': isCollapsed }">
              {{ item.label }}
            </span>
          </a>

          <!-- Child Menu Items (Level 1) -->
          <ul
            class="nav flex-column submenu-level-1"
            *ngIf="hasChildren(item) && item.isExpanded"
            [ngClass]="{ 'submenu-collapsed': isCollapsed }"
          >
            <li class="nav-item" *ngFor="let child of item.children">
              <!-- Child has grandchildren -->
              <button
                *ngIf="hasChildren(child)"
                class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded w-100 text-start"
                (click)="toggleMenuExpand(child)"
                [attr.aria-expanded]="child.isExpanded"
              >
                <i class="bi" [ngClass]="child.icon"></i>
                <span class="menu-text" [ngClass]="{ 'd-none': isCollapsed }">
                  {{ child.label }}
                </span>
                <i
                  class="bi bi-chevron-down ms-auto menu-text"
                  [ngClass]="{
                    'd-none': isCollapsed,
                    'rotate-180': child.isExpanded
                  }"
                ></i>
              </button>

              <!-- Child has no grandchildren -->
              <a
                *ngIf="!hasChildren(child)"
                class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded"
                [routerLink]="child.route"
                routerLinkActive="active"
              >
                <i class="bi" [ngClass]="child.icon"></i>
                <span class="menu-text" [ngClass]="{ 'd-none': isCollapsed }">
                  {{ child.label }}
                </span>
              </a>

              <!-- Grandchild Menu Items (Level 2) -->
              <ul
                class="nav flex-column submenu-level-2"
                *ngIf="hasChildren(child) && child.isExpanded"
                [ngClass]="{ 'submenu-collapsed': isCollapsed }"
              >
                <li class="nav-item" *ngFor="let grandchild of child.children">
                  <a
                    class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded"
                    [routerLink]="grandchild.route"
                    routerLinkActive="active"
                  >
                    <i class="bi" [ngClass]="grandchild.icon"></i>
                    <span class="menu-text" [ngClass]="{ 'd-none': isCollapsed }">
                      {{ grandchild.label }}
                    </span>
                  </a>
                </li>
              </ul>
            </li>
          </ul>
        </li>
      </ng-container>
    </ul>
  </nav>
</div>

<!-- Mobile Offcanvas Sidebar -->
<div
  class="offcanvas offcanvas-start d-lg-none"
  tabindex="-1"
  id="sidebarOffcanvas"
  aria-labelledby="sidebarOffcanvasLabel"
>
  <div class="offcanvas-header bg-dark text-white">
    <h5 class="offcanvas-title" id="sidebarOffcanvasLabel">Menu</h5>
    <button
      type="button"
      class="btn-close btn-close-white"
      data-bs-dismiss="offcanvas"
      aria-label="Close"
    ></button>
  </div>
  <div class="offcanvas-body p-0">
    <ul class="nav flex-column p-3 gap-2">
      <ng-container *ngFor="let item of menuItems">
        <li class="nav-item">
          <button
            *ngIf="hasChildren(item)"
            class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded w-100 text-start"
            (click)="toggleMenuExpand(item)"
            [attr.aria-expanded]="item.isExpanded"
          >
            <i class="bi" [ngClass]="item.icon"></i>
            <span>{{ item.label }}</span>
            <i
              class="bi bi-chevron-down ms-auto"
              [ngClass]="{
                'rotate-180': item.isExpanded
              }"
            ></i>
          </button>

          <a
            *ngIf="!hasChildren(item)"
            class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded"
            [routerLink]="item.route"
            routerLinkActive="active"
            data-bs-dismiss="offcanvas"
          >
            <i class="bi" [ngClass]="item.icon"></i>
            <span>{{ item.label }}</span>
          </a>

          <ul
            class="nav flex-column submenu-level-1"
            *ngIf="hasChildren(item) && item.isExpanded"
          >
            <li class="nav-item" *ngFor="let child of item.children">
              <button
                *ngIf="hasChildren(child)"
                class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded w-100 text-start"
                (click)="toggleMenuExpand(child)"
                [attr.aria-expanded]="child.isExpanded"
              >
                <i class="bi" [ngClass]="child.icon"></i>
                <span>{{ child.label }}</span>
                <i
                  class="bi bi-chevron-down ms-auto"
                  [ngClass]="{
                    'rotate-180': child.isExpanded
                  }"
                ></i>
              </button>

              <a
                *ngIf="!hasChildren(child)"
                class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded"
                [routerLink]="child.route"
                routerLinkActive="active"
                data-bs-dismiss="offcanvas"
              >
                <i class="bi" [ngClass]="child.icon"></i>
                <span>{{ child.label }}</span>
              </a>

              <ul
                class="nav flex-column submenu-level-2"
                *ngIf="hasChildren(child) && child.isExpanded"
              >
                <li class="nav-item" *ngFor="let grandchild of child.children">
                  <a
                    class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded"
                    [routerLink]="grandchild.route"
                    routerLinkActive="active"
                    data-bs-dismiss="offcanvas"
                  >
                    <i class="bi" [ngClass]="grandchild.icon"></i>
                    <span>{{ grandchild.label }}</span>
                  </a>
                </li>
              </ul>
            </li>
          </ul>
        </li>
      </ng-container>
    </ul>
  </div>
</div>
